<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鋼琴黑鍵大冒險 🎹</title>
    <style>
        :root {
            /* 基本尺寸 */
            --white-key-width: 80px;  /* 稍微再加寬，讓畫面更清楚 */
            --white-key-height: 250px;
            --black-key-width: 50px;  
            --black-key-height: 150px;
            /* **修正：增加黑鍵之間的間距** */
            --black-key-gap: 15px; 
            --container-padding: 20px;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        .instructions { font-size: 1.4rem; margin-bottom: 20px; color: #333; font-weight: bold; background: white; padding: 15px 30px; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 3px solid #4CAF50; }
        .score-board { font-size: 2rem; margin-bottom: 15px; color: #e67e22; font-weight: bold; text-shadow: 1px 1px 0 white; }

        /* 鋼琴容器 */
        .piano-container {
            display: flex;
            position: relative;
            background: #1a1a1a;
            padding: var(--container-padding);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* 白鍵 */
        .white-key {
            width: var(--white-key-width);
            height: var(--white-key-height);
            background: linear-gradient(to bottom, #eee 0%, #fff 5%, #fff 100%);
            border: 1px solid #ccc;
            border-radius: 0 0 8px 8px;
            z-index: 1;
        }

        /* 黑鍵組 - 修正定位邏輯 */
        .black-group {
            position: absolute;
            display: flex;
            cursor: pointer;
            z-index: 2;
            top: var(--container-padding);
            padding: 5px;
            border-radius: 10px;
            /* 移除 transition 避免抖動 */
        }

        .black-key {
            width: var(--black-key-width);
            height: var(--black-key-height);
            background: linear-gradient(to bottom, #444 0%, #000 15%, #000 100%);
            border-radius: 0 0 5px 5px;
            box-shadow: 3px 5px 8px rgba(0,0,0,0.6);
            /* **修正：黑鍵之間的距離** */
            margin: 0 calc(var(--black-key-gap) / 2);
        }

        /* 精確對位計算公式：
           縫隙位置 = (白鍵個數 * 寬度)
           黑鍵組起始點 = 縫隙位置 - (第一個黑鍵中心點距離組起始點的距離)
        */

        /* 2個黑鍵組：跨在 C-D 和 D-E 縫隙上 */
        .group-2 { 
            left: calc(var(--container-padding) + var(--white-key-width) - (var(--black-key-width) / 2) - (var(--black-key-gap) / 2) - 5px); 
        }

        /* 3個黑鍵組：跨在 F-G, G-A, A-B 縫隙上 */
        .group-3 { 
            left: calc(var(--container-padding) + (var(--white-key-width) * 4) - (var(--black-key-width) / 2) - (var(--black-key-gap) / 2) - 5px); 
        }

        .octave-2 { transform: translateX(calc(var(--white-key-width) * 7)); }

        /* 回饋效果 */
        .correct { background-color: rgba(76, 175, 80, 0.8) !important; box-shadow: 0 0 20px #4CAF50; }
        .wrong { background-color: rgba(231, 76, 60, 0.8) !important; box-shadow: 0 0 20px #e74c3c; }

        .btn-reset {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        .btn-reset:active { transform: translateY(2px); }
    </style>
</head>
<body>

    <div class="score-board">得分: <span id="score">0</span></div>
    <div class="instructions" id="mission">載入中...</div>

    <div class="piano-container">
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>
        
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>

        <div class="black-group group-2" onclick="checkAnswer(2, this)">
            <div class="black-key"></div><div class="black-key"></div>
        </div>
        <div class="black-group group-3" onclick="checkAnswer(3, this)">
            <div class="black-key"></div><div class="black-key"></div><div class="black-key"></div>
        </div>

        <div class="black-group group-2 octave-2" onclick="checkAnswer(2, this)">
            <div class="black-key"></div><div class="black-key"></div>
        </div>
        <div class="black-group group-3 octave-2" onclick="checkAnswer(3, this)">
            <div class="black-key"></div><div class="black-key"></div><div class="black-key"></div>
        </div>
    </div>

    <button class="btn-reset" onclick="nextRound()">下一題 (Next)</button>

    <script>
        let score = 0;
        let currentTarget = 2;
        let correctClicked = 0;

        function nextRound() {
            document.querySelectorAll('.black-group').forEach(g => g.classList.remove('correct', 'wrong'));
            correctClicked = 0;
            currentTarget = Math.random() > 0.5 ? 2 : 3;
            document.getElementById('mission').innerText = currentTarget === 2 ? "🏠 找出所有的『2個黑鍵』！" : "🏰 找出所有的『3個黑鍵』！";
        }

        function checkAnswer(num, element) {
            if (element.classList.contains('correct') || element.classList.contains('wrong')) return;

            if (num === currentTarget) {
                element.classList.add('correct');
                score += 10;
                correctClicked++;
                document.getElementById('score').innerText = score;
                if (correctClicked === 2) {
                    setTimeout(() => { alert("太棒了！你找對了！"); nextRound(); }, 200);
                }
            } else {
                element.classList.add('wrong');
                score = Math.max(0, score - 5);
                document.getElementById('score').innerText = score;
            }
        }
        nextRound();
    </script>
</body>
</html>
