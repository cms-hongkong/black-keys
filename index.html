<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鋼琴黑鍵大冒險 🎹 Firework Pro</title>
    <style>
        :root {
            --white-key-width: 52px; 
            --white-key-height: 170px;
            --black-key-width: 34px;
            --black-key-height: 105px;
            --gap-group-2: 24px;  
            --gap-group-3: 22px;  
            --gap-group-3-last: 21px;
            --container-padding: 12px; 
            --right-offset: 12px; 
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f3f5;
            margin: 0;
            padding: 10px;
            user-select: none;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        .score-board { font-size: 1.8rem; margin-bottom: 8px; color: #d35400; font-weight: bold; }
        .instructions { 
            font-size: 1.2rem; margin-bottom: 15px; color: #2c3e50; font-weight: bold; 
            background: white; padding: 10px 25px; border-radius: 50px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 3px solid #4CAF50;
            text-align: center;
            max-width: 90vw;
        }

        .piano-container {
            display: flex;
            position: relative;
            background: #1a1a1a;
            padding: var(--container-padding);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border-bottom: 6px solid #000;
            margin-left: 40px; 
            margin-right: 10px;
        }

        .white-key {
            width: var(--white-key-width);
            height: var(--white-key-height);
            background: linear-gradient(to bottom, #eee 0%, #fff 10%, #fff 100%);
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            z-index: 1;
            box-sizing: border-box;
        }

        .black-group {
            position: absolute;
            display: flex;
            cursor: pointer;
            z-index: 2;
            top: calc(var(--container-padding) - 3px); 
            padding: 3px;
            border-radius: 5px;
        }

        .black-key {
            width: var(--black-key-width);
            height: var(--black-key-height);
            background: linear-gradient(to bottom, #444 0%, #000 15%, #000 100%);
            border-radius: 0 0 3px 3px;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.6);
        }

        .group-2 .black-key { margin: 0 calc(var(--gap-group-2) / 2); }
        .group-2 { left: calc(var(--container-padding) + var(--white-key-width) - (var(--black-key-width) + (var(--gap-group-2) / 2)) + var(--right-offset)); }

        .group-3 .black-key { margin: 0 calc(var(--gap-group-3) / 2); }
        .group-3 { left: calc(var(--container-padding) + (var(--white-key-width) * 4) - (var(--black-key-width) + (var(--gap-group-3) / 2)) + var(--right-offset)); }

        .octave-2-low { left: calc(var(--container-padding) + (var(--white-key-width) * 8) - (var(--black-key-width) + (var(--gap-group-2) / 2)) + var(--right-offset)); }

        .last-group-3 .black-key { margin: 0 calc(var(--gap-group-3-last) / 2); }
        .last-group-3 {
            right: calc(var(--container-padding) + var(--white-key-width) - (var(--black-key-width) + (var(--gap-group-2) / 2)) + var(--right-offset));
            left: auto; 
        }

        .correct { background-color: rgba(76, 175, 80, 0.7) !important; box-shadow: 0 0 15px #4CAF50; }
        .wrong { background-color: rgba(231, 76, 60, 0.7) !important; box-shadow: 0 0 15px #e74c3c; }

        .btn-reset {
            margin-top: 20px;
            padding: 10px 35px;
            font-size: 1.1rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
            font-weight: bold;
        }

        /* --- 增大的煙花粒子 --- */
        .firework-particle {
            position: absolute;
            width: 10px; /* 粒子變大 */
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
        }

        /* --- 增強版爆炸動畫 (2秒) --- */
        @keyframes firework-burst-large {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            15% {
                opacity: 1;
            }
            100% {
                /* 飛得更遠 (var(--x) 和 var(--y) 在 JS 設定) */
                transform: translate(var(--x), var(--y)) scale(0.2); 
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="score-board">得分: <span id="score">0</span></div>
    <div class="instructions" id="mission">載入中...</div>

    <div class="piano-container">
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>

        <div class="black-group group-2" onclick="checkAnswer(2, this)">
            <div class="black-key"></div><div class="black-key"></div>
        </div>
        <div class="black-group group-3" onclick="checkAnswer(3, this)">
            <div class="black-key"></div><div class="black-key"></div><div class="black-key"></div>
        </div>
        <div class="black-group group-2 octave-2-low" onclick="checkAnswer(2, this)">
            <div class="black-key"></div><div class="black-key"></div>
        </div>
        <div class="black-group group-3 last-group-3" onclick="checkAnswer(3, this)">
            <div class="black-key"></div><div class="black-key"></div><div class="black-key"></div>
        </div>
    </div>

    <button class="btn-reset" onclick="nextRound()">換一題</button>

    <script>
        let score = 0;
        let currentTarget = 2;
        let correctClicked = 0;
        let isTransitioning = false; // 防止連續點擊進入多次下一題

        function nextRound() {
            isTransitioning = false;
            document.querySelectorAll('.black-group').forEach(g => g.classList.remove('correct', 'wrong'));
            correctClicked = 0;
            currentTarget = Math.random() > 0.5 ? 2 : 3;
            const missionDisplay = document.getElementById('mission');
            missionDisplay.innerHTML = currentTarget === 2 ? 
                "🏠 找出所有的 <span style='color:#e67e22'>『2個黑鍵』</span>" : 
                "🏰 找出所有的 <span style='color:#e67e22'>『3個黑鍵』</span>";
        }

        function checkAnswer(num, element) {
            if (isTransitioning || element.classList.contains('correct') || element.classList.contains('wrong')) return;

            if (num === currentTarget) {
                element.classList.add('correct');
                createBigFirework(element); // 觸發大煙花

                score += 10;
                correctClicked++;
                document.getElementById('score').innerText = score;

                // 如果找齊了兩個
                if (correctClicked === 2) {
                    isTransitioning = true;
                    // 煙花持續 2 秒後自動下一題，移除 alert
                    setTimeout(() => {
                        nextRound();
                    }, 2200); 
                }
            } else {
                element.classList.add('wrong');
                score = Math.max(0, score - 5);
                document.getElementById('score').innerText = score;
            }
        }

        function createBigFirework(element) {
            const pianoContainer = document.querySelector('.piano-container');
            const elementRect = element.getBoundingClientRect();
            const containerRect = pianoContainer.getBoundingClientRect();

            const centerX = elementRect.left + elementRect.width / 2 - containerRect.left;
            const centerY = elementRect.top + elementRect.height / 2 - containerRect.top;

            const particleCount = 20; // 粒子數量增加

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('firework-particle');
                
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';

                // 飛散距離大大增加 (150-300px)
                const angle = Math.random() * Math.PI * 2;
                const distance = 150 + Math.random() * 150;
                const translateX = Math.cos(angle) * distance;
                const translateY = Math.sin(angle) * distance;

                const colors = ['#FF4444', '#FFD700', '#00FF00', '#00FFFF', '#FF00FF', '#FFFFFF'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.setProperty('--x', translateX + 'px');
                particle.style.setProperty('--y', translateY + 'px');
                particle.style.backgroundColor = color;
                
                // 動畫時長設定為 2s
                particle.style.animation = 'firework-burst-large 2s cubic-bezier(0.1, 0.5, 0.3, 1) forwards';

                pianoContainer.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 2000); 
            }
        }

        nextRound();
    </script>
</body>
</html>
