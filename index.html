<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鋼琴黑鍵大冒險 🎹 Firework Turbo</title>
    <style>
        :root {
            --white-key-width: 52px; 
            --white-key-height: 170px;
            --black-key-width: 34px;
            --black-key-height: 105px;
            --gap-group-2: 24px;  
            --gap-group-3: 22px;  
            --gap-group-3-last: 21px;
            --container-padding: 12px; 
            --right-offset: 12px; 
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0f172a; /* 深色背景讓煙花更明顯 */
            color: white;
            margin: 0;
            padding: 10px;
            user-select: none;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        .header { display: flex; gap: 20px; align-items: center; margin-bottom: 10px; }
        .score-board { font-size: 1.8rem; color: #fbbf24; font-weight: bold; }
        .progress-board { font-size: 1.2rem; color: #38bdf8; }

        .instructions { 
            font-size: 1.2rem; margin-bottom: 15px; color: #1e293b; font-weight: bold; 
            background: #f8fafc; padding: 10px 30px; border-radius: 50px; 
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); border: 3px solid #38bdf8;
            text-align: center;
        }

        .piano-container {
            display: flex;
            position: relative;
            background: #1e293b;
            padding: var(--container-padding);
            border-radius: 8px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            border-bottom: 6px solid #000;
            margin-left: 40px; 
            margin-right: 10px;
        }

        .white-key {
            width: var(--white-key-width);
            height: var(--white-key-height);
            background: linear-gradient(to bottom, #cbd5e1 0%, #ffffff 10%, #ffffff 100%);
            border: 1px solid #94a3b8;
            border-radius: 0 0 4px 4px;
            z-index: 1;
            box-sizing: border-box;
        }

        .black-group {
            position: absolute;
            display: flex;
            cursor: pointer;
            z-index: 2;
            top: calc(var(--container-padding) - 3px); 
            padding: 3px;
            border-radius: 5px;
        }

        .black-key {
            width: var(--black-key-width);
            height: var(--black-key-height);
            background: linear-gradient(to bottom, #475569 0%, #000 15%, #000 100%);
            border-radius: 0 0 3px 3px;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.6);
        }

        /* 定位邏輯維持 */
        .group-2 .black-key { margin: 0 calc(var(--gap-group-2) / 2); }
        .group-2 { left: calc(var(--container-padding) + var(--white-key-width) - (var(--black-key-width) + (var(--gap-group-2) / 2)) + var(--right-offset)); }
        .group-3 .black-key { margin: 0 calc(var(--gap-group-3) / 2); }
        .group-3 { left: calc(var(--container-padding) + (var(--white-key-width) * 4) - (var(--black-key-width) + (var(--gap-group-3) / 2)) + var(--right-offset)); }
        .octave-2-low { left: calc(var(--container-padding) + (var(--white-key-width) * 8) - (var(--black-key-width) + (var(--gap-group-2) / 2)) + var(--right-offset)); }
        .last-group-3 .black-key { margin: 0 calc(var(--gap-group-3-last) / 2); }
        .last-group-3 {
            right: calc(var(--container-padding) + var(--white-key-width) - (var(--black-key-width) + (var(--gap-group-2) / 2)) + var(--right-offset));
            left: auto; 
        }

        .correct { background-color: rgba(34, 197, 94, 0.5) !important; box-shadow: 0 0 20px #22c55e; }
        .wrong { background-color: rgba(239, 68, 68, 0.5) !important; box-shadow: 0 0 20px #ef4444; }

        /* --- 強力煙花粒子 --- */
        .firework-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            box-shadow: 0 0 10px currentColor; /* 霓虹發光 */
        }

        @keyframes firework-mega-burst {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { opacity: 1; }
            100% { 
                /* 加上微微的下墜 gravity */
                transform: translate(var(--x), calc(var(--y) + 50px)) scale(0); 
                opacity: 0; 
            }
        }

        /* --- 勝利畫面 --- */
        #victory-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }
        #victory-screen h2 { font-size: 3rem; color: #fbbf24; margin-bottom: 20px; }
        .btn-restart {
            padding: 15px 40px; font-size: 1.5rem; background: #22c55e; color: white;
            border: none; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-board">得分: <span id="score">0</span></div>
        <div class="progress-board">進度: <span id="progress">0</span> / 10</div>
    </div>

    <div class="instructions" id="mission">載入中...</div>

    <div class="piano-container" id="piano">
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>

        <div class="black-group group-2" onclick="checkAnswer(2, this)">
            <div class="black-key"></div><div class="black-key"></div>
        </div>
        <div class="black-group group-3" onclick="checkAnswer(3, this)">
            <div class="black-key"></div><div class="black-key"></div><div class="black-key"></div>
        </div>
        <div class="black-group group-2 octave-2-low" onclick="checkAnswer(2, this)">
            <div class="black-key"></div><div class="black-key"></div>
        </div>
        <div class="black-group group-3 last-group-3" onclick="checkAnswer(3, this)">
            <div class="black-key"></div><div class="black-key"></div><div class="black-key"></div>
        </div>
    </div>

    <div id="victory-screen">
        <h2>🎉 太棒了！ 🎉<br>完成一個回合！</h2>
        <button class="btn-restart" onclick="resetRound()">再玩一回合</button>
    </div>

    <script>
        let score = 0;
        let roundProgress = 0;
        const maxRound = 10;
        let currentTarget = 2;
        let correctClicked = 0;
        let isTransitioning = false;

        function nextRound() {
            isTransitioning = false;
            document.querySelectorAll('.black-group').forEach(g => g.classList.remove('correct', 'wrong'));
            correctClicked = 0;
            
            // 回合檢查
            if (roundProgress >= maxRound) {
                document.getElementById('victory-screen').style.display = 'flex';
                return;
            }

            currentTarget = Math.random() > 0.5 ? 2 : 3;
            const missionDisplay = document.getElementById('mission');
            missionDisplay.innerHTML = currentTarget === 2 ? 
                "🏠 找出所有的 <span style='color:#fbbf24'>『2個黑鍵』</span>" : 
                "🏰 找出所有的 <span style='color:#fbbf24'>『3個黑鍵』</span>";
        }

        function resetRound() {
            score = 0;
            roundProgress = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('progress').innerText = roundProgress;
            document.getElementById('victory-screen').style.display = 'none';
            nextRound();
        }

        function checkAnswer(num, element) {
            if (isTransitioning || element.classList.contains('correct') || element.classList.contains('wrong')) return;

            if (num === currentTarget) {
                element.classList.add('correct');
                triggerMegaFirework(element); // 觸發超強煙花

                score += 10;
                correctClicked++;
                document.getElementById('score').innerText = score;

                if (correctClicked === 2) {
                    isTransitioning = true;
                    roundProgress++;
                    document.getElementById('progress').innerText = roundProgress;

                    setTimeout(() => {
                        nextRound();
                    }, 2200); 
                }
            } else {
                element.classList.add('wrong');
                score = Math.max(0, score - 5);
                document.getElementById('score').innerText = score;
            }
        }

        function triggerMegaFirework(element) {
            const piano = document.getElementById('piano');
            const rect = element.getBoundingClientRect();
            const pRect = piano.getBoundingClientRect();

            const cx = rect.left + rect.width / 2 - pRect.left;
            const cy = rect.top + rect.height / 2 - pRect.top;

            const particles = 40; // 強力 40 顆

            for (let i = 0; i < particles; i++) {
                const p = document.createElement('div');
                p.className = 'firework-particle';
                
                // 彩虹色系
                const colors = ['#ff0000', '#00ff00', '#00ffff', '#ffff00', '#ff00ff', '#ffffff', '#38bdf8'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';
                p.style.color = color;
                p.style.backgroundColor = color;

                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 250;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;

                p.style.setProperty('--x', tx + 'px');
                p.style.setProperty('--y', ty + 'px');
                
                p.style.animation = `firework-mega-burst ${1.5 + Math.random() * 1}s cubic-bezier(0, 0.9, 0.3, 1) forwards`;

                piano.appendChild(p);
                setTimeout(() => p.remove(), 2500);
            }
        }

        nextRound();
    </script>
</body>
</html>
