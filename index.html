<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鋼琴黑鍵大冒險 🎹 精密位移最終校正版</title>
    <style>
        :root {
            /* 基礎尺寸 */
            --white-key-width: 52px;
            --white-key-height: 170px;
            --black-key-width: 34px;
            --black-key-height: 105px;
            --container-padding: 12px;
            --piano-margin-l: 40px; 
            
            /* 群組位移量 */
            --shift-right: 3px; 
            --shift-left: 3px;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 20px 0;
            user-select: none;
            touch-action: manipulation;
            overflow-x: auto;
        }

        .header { display: flex; gap: 30px; margin-bottom: 15px; align-items: center; }
        .score-board { font-size: 1.8rem; color: #fbbf24; font-weight: bold; }

        .instructions { 
            font-size: 1.3rem; margin-bottom: 25px; color: #1e293b; font-weight: bold; 
            background: #f8fafc; padding: 12px 35px; border-radius: 50px; 
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); border: 3px solid #38bdf8;
        }

        .piano-container {
            display: flex;
            position: relative;
            background: #1e293b;
            padding: var(--container-padding);
            border-radius: 8px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border-bottom: 8px solid #000;
            margin-left: var(--piano-margin-l);
            width: fit-content;
        }

        .white-key {
            width: var(--white-key-width);
            height: var(--white-key-height);
            background: linear-gradient(to bottom, #eee 0%, #fff 10%, #fff 100%);
            border: 1px solid #94a3b8;
            border-radius: 0 0 5px 5px;
            z-index: 1;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .black-group {
            position: absolute;
            z-index: 2;
            top: var(--container-padding);
            height: var(--black-key-height);
            cursor: pointer;
        }

        .black-key {
            position: absolute;
            width: var(--black-key-width);
            height: var(--black-key-height);
            background: linear-gradient(to bottom, #444 0%, #000 15%, #000 100%);
            border-radius: 0 0 4px 4px;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.5);
        }

        /* ----------------------------------------------------
           🎯 核心精密位移 (Individual & Group Offsets)
        ---------------------------------------------------- */

        /* 第 1 組 (2鍵) - 整體右移 3px，第 2 鍵再右移 3px */
        .group-1 { left: calc(var(--container-padding) + var(--white-key-width) - (var(--black-key-width) / 2) + var(--shift-right)); }
        .group-1 .k1 { left: -3px; }
        .group-1 .k2 { left: calc(var(--white-key-width) - 5px); } /* 從 -8px 變成 -5px */

        /* 第 2 組 (3鍵) - 整體右移 3px，第 2, 3 鍵再右移 3px */
        .group-2 { left: calc(var(--container-padding) + (var(--white-key-width) * 4) - (var(--black-key-width) / 2) + var(--shift-right)); }
        .group-2 .k1 { left: -3px; }
        .group-2 .k2 { left: calc(var(--white-key-width) - 2px); }      /* 從 -5px 變成 -2px */
        .group-2 .k3 { left: calc((var(--white-key-width) * 2) - 6px); } /* 從 -9px 變成 -6px */

        /* 第 3 組 (2鍵) - 整體右移 3px，第 2 鍵再右移 3px */
        .group-3 { left: calc(var(--container-padding) + (var(--white-key-width) * 8) - (var(--black-key-width) / 2) + var(--shift-right)); }
        .group-3 .k1 { left: -3px; }
        .group-3 .k2 { left: calc(var(--white-key-width) - 5px); } /* 從 -8px 變成 -5px */

        /* 第 4 組 (3鍵) - 保持整體左移 3px，內部維持 (5, 5, 3) */
        .group-4 { left: calc(var(--container-padding) + (var(--white-key-width) * 11) - (var(--black-key-width) / 2) - var(--shift-left)); }
        .group-4 .k1 { left: 5px; }
        .group-4 .k2 { left: calc(var(--white-key-width) + 5px); }
        .group-4 .k3 { left: calc((var(--white-key-width) * 2) + 3px); }

        /* ---------------------------------------------------- */

        .correct .black-key { background: linear-gradient(to bottom, #22c55e, #166534) !important; box-shadow: 0 0 15px #22c55e; }
        .wrong .black-key { background: linear-gradient(to bottom, #ef4444, #991b1b) !important; box-shadow: 0 0 15px #ef4444; }

        .firework-particle {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            pointer-events: none; z-index: 100;
        }
        @keyframes firework-burst {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        #victory-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-board">得分: <span id="score">0</span></div>
        <div style="font-size: 1.2rem; color: #38bdf8;">進度: <span id="progress">0</span> / 10</div>
    </div>

    <div class="instructions" id="mission">載入中...</div>

    <div class="piano-container" id="piano">
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>

        <div class="black-group group-1" onclick="checkAnswer(2, this)">
            <div class="black-key k1"></div><div class="black-key k2"></div>
        </div>
        <div class="black-group group-2" onclick="checkAnswer(3, this)">
            <div class="black-key k1"></div><div class="black-key k2"></div><div class="black-key k3"></div>
        </div>
        <div class="black-group group-3" onclick="checkAnswer(2, this)">
            <div class="black-key k1"></div><div class="black-key k2"></div>
        </div>
        <div class="black-group group-4" onclick="checkAnswer(3, this)">
            <div class="black-key k1"></div><div class="black-key k2"></div><div class="black-key k3"></div>
        </div>
    </div>

    <div id="victory-screen">
        <h2 style="font-size: 3rem; color: #fbbf24;">🎉 挑戰成功 🎉</h2>
        <button onclick="resetRound()" style="margin-top:20px; padding: 18px 50px; font-size: 1.6rem; background: #22c55e; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;">再玩一次</button>
    </div>

    <script>
        let score = 0; let roundProgress = 0; let currentTarget = null; let correctClicked = 0; let isTransitioning = false;
        function nextRound() {
            isTransitioning = false;
            document.querySelectorAll('.black-group').forEach(g => g.classList.remove('correct', 'wrong'));
            correctClicked = 0;
            if (roundProgress >= 10) { document.getElementById('victory-screen').style.display = 'flex'; return; }
            currentTarget = Math.random() > 0.5 ? 2 : 3;
            document.getElementById('mission').innerHTML = currentTarget === 2 ? 
                "🏠 找出所有的 <span style='color:#fbbf24'>『2個黑鍵』</span>" : 
                "🏰 找出所有的 <span style='color:#fbbf24'>『3個黑鍵』</span>";
        }
        function checkAnswer(num, element) {
            if (isTransitioning || element.classList.contains('correct')) return;
            if (num === currentTarget) {
                element.classList.add('correct'); score += 10; correctClicked++;
                document.getElementById('score').innerText = score;
                triggerFirework(element);
                if (correctClicked === 2) {
                    isTransitioning = true; roundProgress++;
                    document.getElementById('progress').innerText = roundProgress;
                    setTimeout(nextRound, 1500);
                }
            } else {
                element.classList.add('wrong');
                setTimeout(() => element.classList.remove('wrong'), 500);
            }
        }
        function triggerFirework(el) {
            const rect = el.getBoundingClientRect(); const piano = document.getElementById('piano'); const pRect = piano.getBoundingClientRect();
            const cx = rect.left + rect.width / 2 - pRect.left; const cy = rect.top + rect.height / 2 - pRect.top;
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div'); p.className = 'firework-particle';
                const colors = ['#fbbf24', '#38bdf8', '#4ade80', '#f87171'];
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = cx + 'px'; p.style.top = cy + 'px';
                const angle = Math.random() * Math.PI * 2; const dist = 50 + Math.random() * 100;
                p.style.setProperty('--x', Math.cos(angle) * dist + 'px'); p.style.setProperty('--y', Math.sin(angle) * dist + 'px');
                p.style.animation = `firework-burst 0.8s ease-out forwards`;
                piano.appendChild(p); setTimeout(() => p.remove(), 1000);
            }
        }
        function resetRound() { score = 0; roundProgress = 0; document.getElementById('victory-screen').style.display = 'none'; nextRound(); }
        nextRound();
    </script>
</body>
</html>
