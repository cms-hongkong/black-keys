<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鋼琴黑鍵大冒險 🎹</title>
    <style>
        :root {
            --white-key-width: 80px;
            --white-key-height: 250px;
            --black-key-width: 50px;
            --black-key-height: 155px;
            
            /* 維持你要求的數值 */
            --black-key-gap: 18px;     
            --container-padding: 17px; 
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f7f9fc;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        .score-board { font-size: 2.2rem; margin-bottom: 15px; color: #d35400; font-weight: bold; }
        .instructions { 
            font-size: 1.6rem; margin-bottom: 30px; color: #2c3e50; font-weight: bold; 
            background: white; padding: 15px 40px; border-radius: 50px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 4px solid #4CAF50;
        }

        .piano-container {
            display: flex;
            position: relative;
            background: #1a1a1a;
            padding: var(--container-padding);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border-bottom: 10px solid #000;
        }

        .white-key {
            width: var(--white-key-width);
            height: var(--white-key-height);
            background: linear-gradient(to bottom, #eee 0%, #fff 10%, #fff 100%);
            border: 1px solid #ccc;
            border-radius: 0 0 6px 6px;
            z-index: 1;
            box-sizing: border-box;
        }

        .black-group {
            position: absolute;
            display: flex;
            cursor: pointer;
            z-index: 2;
            top: var(--container-padding);
            padding: 5px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }

        .black-key {
            width: var(--black-key-width);
            height: var(--black-key-height);
            background: linear-gradient(to bottom, #444 0%, #000 15%, #000 100%);
            border-radius: 0 0 4px 4px;
            box-shadow: 4px 6px 12px rgba(0,0,0,0.6);
            margin: 0 calc(var(--black-key-gap) / 2);
        }

        /* --- 修正定位：向右大幅偏移 (+8px) --- */
        
        .group-2 { 
            /* 修正為 +8px，讓黑鍵明顯向右移動 */
            left: calc(var(--container-padding) + var(--white-key-width) - (var(--black-key-width) + (var(--black-key-gap) / 2)) + 8px); 
        }

        .group-3 { 
            /* 修正為 +8px */
            left: calc(var(--container-padding) + (var(--white-key-width) * 4) - (var(--black-key-width) + (var(--black-key-gap) / 2)) + 8px); 
        }

        .octave-2 { transform: translateX(calc(var(--white-key-width) * 7)); }

        .correct { background-color: rgba(76, 175, 80, 0.7) !important; box-shadow: 0 0 20px #4CAF50; }
        .wrong { background-color: rgba(231, 76, 60, 0.7) !important; box-shadow: 0 0 20px #e74c3c; }

        .btn-reset {
            margin-top: 40px;
            padding: 18px 55px;
            font-size: 1.3rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="score-board">得分: <span id="score">0</span></div>
    <div class="instructions" id="mission">載入中...</div>

    <div class="piano-container">
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>
        <div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div><div class="white-key"></div>

        <div class="black-group group-2" onclick="checkAnswer(2, this)">
            <div class="black-key"></div><div class="black-key"></div>
        </div>
        <div class="black-group group-3" onclick="checkAnswer(3, this)">
            <div class="black-key"></div><div class="black-key"></div><div class="black-key"></div>
        </div>

        <div class="black-group group-2 octave-2" onclick="checkAnswer(2, this)">
            <div class="black-key"></div><div class="black-key"></div>
        </div>
        <div class="black-group group-3 octave-2" onclick="checkAnswer(3, this)">
            <div class="black-key"></div><div class="black-key"></div><div class="black-key"></div>
        </div>
    </div>

    <button class="btn-reset" onclick="nextRound()">下一題 (Next)</button>

    <script>
        let score = 0;
        let currentTarget = 2;
        let correctClicked = 0;

        function nextRound() {
            document.querySelectorAll('.black-group').forEach(g => g.classList.remove('correct', 'wrong'));
            correctClicked = 0;
            currentTarget = Math.random() > 0.5 ? 2 : 3;
            const missionDisplay = document.getElementById('mission');
            missionDisplay.innerHTML = currentTarget === 2 ? 
                "🏠 找出所有的 <span style='color:#e67e22'>『2個黑鍵』</span> (小房子)" : 
                "🏰 找出所有的 <span style='color:#e67e22'>『3個黑鍵』</span> (大房子)";
        }

        function checkAnswer(num, element) {
            if (element.classList.contains('correct') || element.classList.contains('wrong')) return;
            if (num === currentTarget) {
                element.classList.add('correct');
                score += 10;
                correctClicked++;
                document.getElementById('score').innerText = score;
                if (correctClicked === 2) {
                    setTimeout(() => { alert("答對了！你找得很快喔！"); nextRound(); }, 200);
                }
            } else {
                element.classList.add('wrong');
                score = Math.max(0, score - 5);
                document.getElementById('score').innerText = score;
            }
        }
        nextRound();
    </script>
</body>
</html>
